<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Departure lounge - World Cup 2026</title>
    <link rel="icon" href="/assets/logo/app-icon.png" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="/assets/logo/app-icon.png" sizes="512x512">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="page-header">
      <div class="page-header__top">
        <div class="page-header__brand">
          <img class="brand-mark" src="/assets/logo/mark.svg" alt="" width="40" height="40">
          <div class="page-header__sub">
            <h1>Departure lounge</h1>
            <p class="page-header__tag">World Cup 2026</p>
          </div>
        </div>
        <div class="page-header__actions">
          <button id="eliminated-refresh" type="button">Refresh eliminations</button>
        </div>
      </div>
      <nav class="page-header__nav page-header__nav--links">
        <a class="tab tab--link" href="/">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6 M18 9h1.5a2.5 2.5 0 0 0 0-5H18 M4 22h16 M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22 M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22 M18 2H6v7a6 6 0 0 0 12 0z"/></svg>
          <span class="tab__label">Sweepstake</span>
        </a>
        <a class="tab tab--link" href="/third-place.html">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 6h13 M8 12h13 M8 18h13 M3 6h.01 M3 12h.01 M3 18h.01"/></svg>
          <span class="tab__label">Third-place watch</span>
        </a>
        <a class="tab tab--link tab--on" href="/eliminated.html" aria-current="page">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3.5S18 3 16.5 4.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
          <span class="tab__label">Eliminated</span>
        </a>
      </nav>
    </header>

    <main class="screen eliminated-screen">
      <section class="eliminated-page__head">
        <div>
          <h2 class="sw-h2">Departure lounge</h2>
          <p class="eliminated-intro">Eliminated teams will appear here once their tournament is over.</p>
        </div>
        <div class="tp-meta">
          <span>Last updated</span>
          <strong id="last-updated">...</strong>
        </div>
      </section>

      <div id="eliminated-root">
        <section class="generated-scene" aria-label="Generated departure scene">
          <p class="generated-scene__status">Loading departure lounge...</p>
          <div class="eliminated-layout">
            <div class="generated-scene__lounge generated-scene__fallback"></div>
            <div class="generated-scene__board generated-scene__fallback"></div>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <span>Sweepstake 26</span>
      <span class="footer__meta">Provider <span id="provider-status">...</span></span>
    </footer>

    <script src="/eliminated.js"></script>
  </body>
</html>
