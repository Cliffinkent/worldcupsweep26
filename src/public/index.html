<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sweepstake — World Cup 2026</title>
    <link rel="icon" href="/assets/logo/app-icon.png" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="/assets/logo/app-icon.png" sizes="512x512">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="page-header">
      <div class="page-header__top">
        <div class="page-header__brand">
          <img class="brand-mark" src="/assets/logo/mark.svg" alt="" width="40" height="40">
          <div class="page-header__sub">
            <h1>Sweepstake</h1>
            <p class="page-header__tag">World Cup 2026</p>
          </div>
        </div>
        <div class="page-header__actions">
          <span class="livedot" id="live-indicator" hidden>
            <span class="livedot__d"></span><span id="live-count"></span>
          </span>
          <label class="owner-filter">
            <span class="owner-filter__label">My teams</span>
            <select id="owner-filter" class="owner-filter__select" aria-label="Filter by player">
              <option value="">All players</option>
            </select>
          </label>
          <button id="refresh-button" type="button">Refresh</button>
        </div>
      </div>
      <nav class="page-header__nav" id="tabs">
        <button class="tab" type="button" data-screen="leaderboard">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6 M18 9h1.5a2.5 2.5 0 0 0 0-5H18 M4 22h16 M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22 M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22 M18 2H6v7a6 6 0 0 0 12 0z"/></svg>

          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8z M22 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="tab__label">Groups</span>
        </button>
        <button class="tab" type="button" data-screen="fixtures">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2v4 M16 2v4 M3 10h18 M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>

        </button>
        <button class="tab" type="button" data-screen="bracket">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3v12 M18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M15 6a9 9 0 0 0-9 9"/></svg>

        <a class="tab tab--link" href="/third-place.html">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 6h13 M8 12h13 M8 18h13 M3 6h.01 M3 12h.01 M3 18h.01"/></svg>
          <span class="tab__label">Third-place watch</span>
        </a>
        <a class="tab tab--link" href="/eliminated.html">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3.5S18 3 16.5 4.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>

        </a>
      </nav>

    <main class="screen" id="screen"></main>

    <footer class="footer">
      <span>Sweepstake 26</span>
      <span class="footer__meta">Last updated <span id="last-updated">…</span> · Provider <span id="provider-status">…</span></span>
    </footer>

    <script src="/app.js"></script>
    <script type="module" src="/analytics.js"></script>

</html>
