<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sweepstake — World Cup 2026</title>
    <link rel="icon" href="/assets/logo/mark.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/logo/app-icon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="page-header">
      <div class="page-header__brand">
        <img class="brand-mark" src="/assets/logo/mark.svg" alt="" width="40" height="40">
        <div class="page-header__sub">
          <h1>Sweepstake</h1>
          <p class="page-header__tag">World Cup 2026</p>
        </div>
      </div>
      <button id="refresh-button" type="button">Refresh</button>
    </header>

    <main>
      <section>
        <h2>Overview</h2>
        <div id="overview" class="summary-grid"></div>
        <p class="meta">Provider: <span id="provider-status">Loading...</span></p>
        <p class="meta">Last updated: <span id="last-updated">Loading...</span></p>
      </section>

      <section>
        <h2>Groups</h2>
        <div id="groups" class="groups-grid"></div>
      </section>

      <section>
        <h2>Fixtures</h2>
        <div id="fixtures"></div>
      </section>

      <section>
        <h2>Bracket</h2>
        <div id="bracket" class="bracket-grid"></div>
      </section>

      <section>
        <h2>Players</h2>
        <div id="players"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
