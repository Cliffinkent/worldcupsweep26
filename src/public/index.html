<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sweepstake — World Cup 2026</title>
    <link rel="icon" href="/assets/logo/mark.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/logo/app-icon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="page-header">
      <div class="page-header__top">
        <div class="page-header__brand">
          <img class="brand-mark" src="/assets/logo/mark.svg" alt="" width="40" height="40">
          <div class="page-header__sub">
            <h1>Sweepstake</h1>
            <p class="page-header__tag">World Cup 2026</p>
          </div>
        </div>
        <div class="page-header__actions">
          <span class="livedot" id="live-indicator" hidden>
            <span class="livedot__d"></span><span id="live-count"></span>
          </span>
          <button id="refresh-button" type="button">Refresh</button>
        </div>
      </div>
      <nav class="page-header__nav" id="tabs">
        <button class="tab" type="button" data-screen="leaderboard">Leaderboard</button>
        <button class="tab" type="button" data-screen="groups">Groups</button>
        <button class="tab" type="button" data-screen="fixtures">Fixtures</button>
        <button class="tab" type="button" data-screen="bracket">Bracket</button>
      </nav>
    </header>

    <main class="screen" id="screen"></main>

    <footer class="footer">
      <span>Sweepstake 26</span>
      <span class="footer__meta">Last updated <span id="last-updated">…</span> · Provider <span id="provider-status">…</span></span>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
